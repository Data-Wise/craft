name: Homebrew Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.17.0)'
        required: true
        type: string
      auto_merge:
        description: 'Auto-merge the formula PR'
        required: false
        type: boolean
        default: true

jobs:
  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate release consistency
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/pre-release-check.sh "$RELEASE_VERSION"

  prepare:
    name: Prepare Release Info
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      sha256: ${{ steps.release.outputs.sha256 }}
      command_count: ${{ steps.metadata.outputs.command_count }}
      agent_count: ${{ steps.metadata.outputs.agent_count }}
      skill_count: ${{ steps.metadata.outputs.skill_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version and calculate SHA
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          TARBALL_URL="https://github.com/Data-Wise/craft/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL --retry 3 --retry-delay 2 "$TARBALL_URL" | sha256sum | cut -d' ' -f1)

          # Validate SHA256 is not empty (download failed)
          if [ -z "$SHA256" ] || [ ${#SHA256} -ne 64 ]; then
            echo "::error::SHA256 calculation failed. Got: '$SHA256'"
            exit 1
          fi

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "SHA256: $SHA256"

      - name: Extract plugin metadata
        id: metadata
        run: |
          CMD_COUNT=$(find commands -name "*.md" ! -name "index.md" ! -name "README.md" | wc -l | tr -d ' ')
          AGENT_COUNT=$(find agents -name "*.md" | wc -l | tr -d ' ')
          SKILL_COUNT=$(find skills -name "*.md" | wc -l | tr -d ' ')
          echo "command_count=$CMD_COUNT" >> $GITHUB_OUTPUT
          echo "agent_count=$AGENT_COUNT" >> $GITHUB_OUTPUT
          echo "skill_count=$SKILL_COUNT" >> $GITHUB_OUTPUT
          echo "Metadata: $CMD_COUNT commands, $AGENT_COUNT agents, $SKILL_COUNT skills"

  update-homebrew:
    name: Update Homebrew Formula
    needs: prepare
    runs-on: ubuntu-latest
    # Inlines the formula update against the homebrew-tap manifest+regen pattern.
    # Replaces a previous workflow_call which depended on HOMEBREW_TAP_GITHUB_TOKEN
    # — an expiring PAT that broke the v2.32.0 release. Now uses GitHub App auth
    # (APP_ID + APP_PRIVATE_KEY) which mints short-lived tokens per run.
    # See issue #129 for context.
    steps:
      - name: Mint GitHub App token (for cross-repo push to homebrew-tap)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Data-Wise
          repositories: homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Data-Wise/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update manifest and regenerate craft formula
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA256: ${{ needs.prepare.outputs.sha256 }}
          CMD_COUNT: ${{ needs.prepare.outputs.command_count }}
        working-directory: homebrew-tap
        run: |
          python3 - <<'PY'
          import json, os
          m = json.load(open('generator/manifest.json'))
          formulas = m.get('formulas', m)
          craft = formulas['craft']
          craft['version'] = os.environ['VERSION']
          craft['sha256'] = os.environ['SHA256']
          craft['desc'] = f"Full-stack developer toolkit for Claude Code with {os.environ['CMD_COUNT']} commands"
          with open('generator/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          print(f"manifest updated: craft -> v{craft['version']}")
          PY
          python3 generator/generate.py craft
          ruby -c Formula/craft.rb

      - name: Commit and push to tap
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/craft.rb generator/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit (formula already at v${VERSION})"
            exit 0
          fi
          git commit -m "craft: update to v${VERSION}"
          git push origin main
