name: Documentation Quality

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-quality.yml'
      - 'scripts/docs-staleness-check.sh'
      - 'scripts/config/exclusions.txt'
  push:
    branches: [main, dev]
    paths:
      - 'docs/**/*.md'
      - 'README.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'scripts/docs-staleness-check.sh'
      - 'scripts/config/exclusions.txt'

concurrency:
  group: docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run markdown linting
        run: npx markdownlint-cli2 "docs/**/*.md" "README.md" "CLAUDE.md" --config .markdownlint.json
        continue-on-error: true

      - name: Check emoji-attribute spacing (CRAFT-001)
        run: bash scripts/docs-lint-emoji.sh

  link-check:
    name: Link Validation (Lychee)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee
          restore-keys: cache-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --cache --max-cache-age 1d --exclude-all-private --timeout 20 --max-retries 3 'docs/**/*.md' 'README.md' 'CLAUDE.md'
          fail: false
          format: markdown
          output: lychee-output.md

  staleness-check:
    name: Docs Staleness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run docs staleness check
        run: |
          bash scripts/docs-staleness-check.sh --non-interactive
          bash scripts/docs-staleness-check.sh --json > staleness-report.json || true
        continue-on-error: true

      - name: Upload staleness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staleness-report
          path: staleness-report.json
          if-no-files-found: ignore

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [markdown-lint, link-check, staleness-check]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Markdown lint: ${{ needs.markdown-lint.result }}"
          echo "Link check: ${{ needs.link-check.result }}"
          echo "Staleness check: ${{ needs.staleness-check.result }}"
