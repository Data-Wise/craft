# Pre-commit hooks for craft plugin
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Markdown linting with auto-fix
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args:
          - --config
          - .markdownlint.json
          - --fix
        files: \.md$
        # Exclude generated files and test fixtures
        exclude: |
          (?x)^(
            docs/brainstorm/.*|
            tests/fixtures/.*
          )$

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags
      - id: end-of-file-fixer
        files: \.(md|yaml|yml|json)$
      - id: trailing-whitespace
        files: \.(md|yaml|yml|json)$
        args: [--markdown-linebreak-ext=md]

  # JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-json
        files: \.json$

  # Custom CRAFT-001: emoji-attribute spacing check
  # Detects `:emoji: {` (space before brace) which breaks MkDocs attr_list
  - repo: local
    hooks:
      - id: emoji-attr-spacing
        name: Check emoji-attribute spacing (CRAFT-001)
        entry: bash -c 'scripts/docs-lint-emoji.sh'
        language: system
        files: '\.md$'
        pass_filenames: false
      - id: mermaid-validate
        name: Validate Mermaid diagrams in markdown
        entry: bash -c 'scripts/hooks/pre-commit-mermaid.sh'
        language: system
        files: '\.md$'
        pass_filenames: false
      - id: claude-md-budget
        name: Check CLAUDE.md budget (< 150 lines)
        entry: bash -c 'scripts/claude-md-budget-check.sh'
        language: system
        files: 'CLAUDE\.md$'
        pass_filenames: false
      # Governance gate: prove every checker behaves on its fixtures (selftest)
      # and that the generated rule block is not stale (render --check). NOT the
      # live-env audit (run_rules.py default) — that needs canon repos / the
      # ~/.claude/skills tree, which a clean pre-commit run lacks.
      - id: governance-gate
        name: Governance selftest + rules-doc drift check
        entry: bash -c 'python3 governance/run_rules.py --selftest && python3 governance/render_rules.py --check governance/CLAUDE-rules.md'
        language: system
        files: ^governance/
        pass_filenames: false

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
