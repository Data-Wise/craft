# Skill-Ecosystem Governance — canonical rule set (policy-as-code)
# SINGLE SOURCE OF TRUTH for the rules. Human-readable copies (CLAUDE.md blocks,
# reports) are GENERATED from this file — never hand-edit those.
#
# Add a rule = add one entry here + a descriptive commit (solo-light process).
# severity: error  -> blocks at its gates
#           warn   -> surfaced, never blocks
#           advisory -> documented, no automated check yet
# A rule with current violations may land green via a time-boxed `waivers:` entry.
#
# Phase 0 scope: skills-only. Engine home: craft. Posture: gentle-ramp.
version: 0
scope: skills
posture: gentle-ramp

rules:
  - id: R01-single-source
    statement: "A skill is authored in exactly one canon repo (savant=research, scholar=teaching)."
    rationale: "One owner per skill; a name in two canons means divergence."
    severity: warn
    owner: stat-wise
    status: active
    added: 2026-06-20
    # gate=session, not ci: the duplicate check needs the savant + scholar canon
    # repos checked out, which only holds locally. In craft CI those dirs are
    # absent and the check is vacuous (it now says so out loud). Promote to ci
    # once a canon-aware runner exists.
    gates: [session]
    check: { kind: script, cmd: "checks/no_duplicate_canon.py" }
    waivers: []

  # R02 and R08 deliberately share one mechanism (no_broken_symlinks.py against
  # {target}): R02 is the authoring intent ("don't hand-link"), R08 is the
  # cleanup invariant ("dead links are never load-bearing"). They will always
  # pass/fail together against the same target — that is expected, not a bug.
  - id: R02-no-hand-links
    statement: "Consumers install skills via a marketplace; never hand-symlink or copy."
    rationale: "Manual links break when the source moves (17 dead monorepo links)."
    severity: error
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [session, ci]
    check:
      kind: script
      cmd: "checks/no_broken_symlinks.py {target}"
      fixtures: { good: fixtures/no-broken-symlinks/good, bad: fixtures/no-broken-symlinks/bad }
    waivers: []

  - id: R03-private-marketplace
    statement: "A PII-bearing plugin is published only to a PRIVATE marketplace; a public marketplace never references a private repo."
    rationale: "savant carries research-profile PII; Data-Wise/claude-plugins is public."
    severity: error
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [release, ci]
    check: { kind: manual }   # Phase 1: scan public marketplace.json for private-repo refs
    waivers: []

  - id: R04-consume-not-copy
    statement: "Update a skill on a surface via `plugin update`, never by re-copying."
    rationale: "Copies drift; the installer is the only writer of consumer surfaces."
    severity: warn
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [session]
    check: { kind: manual }
    waivers: []

  - id: R05-no-edit-caches
    statement: "plugins/cache/** and the frozen session cache are read-only."
    rationale: "Edits to a cache evaporate; the fix is a re-install of the canon."
    severity: advisory
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: []
    check: { kind: manual }
    waivers: []

  - id: R06-one-index
    statement: "SKILLS-INDEX.md is generated by the auditor, not hand-curated."
    rationale: "A hand-edited index drifts from reality."
    severity: warn
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [session]
    check: { kind: script, cmd: "checks/index_is_generated.py {index}" }
    waivers: []

  - id: R07-version-is-truth
    statement: "A consumer pin equals the canon plugin.json version (no drift)."
    rationale: "savant sat 3 releases stale; drift is a bug, not a state."
    severity: error
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [session, release]
    check: { kind: external, cmd: "skills-audit.py --json" }  # cross-surface auditor supplies drift findings
    waivers: []

  - id: R08-no-dead-links
    statement: "A broken symlink in a consumer skills dir is never load-bearing — remove it."
    rationale: "Dead links clutter discovery and break tools that walk the dir."
    severity: error
    owner: stat-wise
    status: active
    added: 2026-06-20
    gates: [session, ci]
    check:
      kind: script
      cmd: "checks/no_broken_symlinks.py {target}"
      fixtures: { good: fixtures/no-broken-symlinks/good, bad: fixtures/no-broken-symlinks/bad }
    waivers: []
