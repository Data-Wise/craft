site_name: Craft Plugin
site_description: Full-stack developer toolkit - 107 commands, 8 agents, 26 skills for code, git, site, docs, testing, architecture, CI, distribution, teaching workflows, and planning with ADHD-friendly interfaces. v2.25.0 adds unified test system, CLAUDE.md layered instructions, and insights-driven friction prevention.
site_url: https://data-wise.github.io/craft/

repo_name: Data-Wise/craft
repo_url: https://github.com/Data-Wise/craft
edit_uri: edit/main/docs/

exclude_docs: |
  /README.md
  # Working artifacts - not published content
  archive/
  brainstorm/
  orch/
  dev/
  # Active specs are working documents
  specs/SPEC-*.md
  # Stale standalone docs
  FEATURE-RELEASE-CLAUDE-MD.md
  GIF-REGENERATION-CHECKLIST.md
  PHASE2-CONSOLIDATION.md
  VALIDATOR-BEST-PRACTICES.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-init.js

plugins:
  - search
  # TODO: Add mkdocs-redirects plugin (requires: pip install mkdocs-redirects)
  # - redirects:
  #     redirect_maps:
  #       # Help → Commands merger (Phase 2)
  #       'help/hub.md': 'commands/overview.md'
  #       'help/do.md': 'commands/smart.md'
  #       'help/check.md': 'commands/smart.md'
  #       'help/orchestrate.md': 'commands/smart.md'
  #       'help/git-worktree.md': 'commands/git.md'
  #       'help/docs-update.md': 'commands/docs.md'
  #       'help/ci-generate.md': 'commands/git.md'
  #       'help/brainstorm.md': 'commands/plan.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

